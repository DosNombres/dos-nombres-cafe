<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dos Nombres Café</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0a0a0a;
            color:white;
            font-family:Arial, sans-serif;
        }

        header{
            text-align:center;
            padding:80px 20px;
        }

        h1{
            color:#d4af37;
            font-size:60px;
        }

        .slogan{
            font-size:22px;
            margin-top:15px;
            color:#f5f5f5;
        }

        .btn{
            display:inline-block;
            margin-top:30px;
            background:#d4af37;
            color:black;
            padding:15px 30px;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }

        section{
            padding:60px 20px;
            text-align:center;
        }

        h2{
            color:#d4af37;
            margin-bottom:20px;
        }
    </style>
</head>
<body>

<header>
    <h1>DOS NOMBRES CAFÉ</h1>

    <p class="slogan">
        Donde el alma tiene sabor a recuerdo.
    </p>

    <a class="btn" href="#">
        Reservar por WhatsApp
    </a>
</header>

<section>
    <h2>Nuestro Concepto</h2>

    <p>
        Café, brunch y experiencias que unen sabores,
        recuerdos y momentos especiales.
    </p>
</section>

</body>
</html>
